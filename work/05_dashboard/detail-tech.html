<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="refresh" content="0; url=./frontend/dist/index.html?view=dashboard" />
    <title>정책-기술 대시보드로 이동 중</title>
    <script>
      (function () {
        const next = new URL("./frontend/dist/index.html?view=dashboard", window.location.href);
        if (window.location.search) {
          next.search = window.location.search;
        }
        if (!next.search || next.search === "?") {
          next.search = "?view=dashboard";
        }
        if (next.href !== window.location.href) {
          window.location.replace(next.href);
        }
      })();
    </script>
  </head>
  <body>
    <p>
      대시보드 메인으로 이동합니다.
      <a href="./frontend/dist/index.html?view=dashboard">바로 이동</a>
    </p>
  </body>
</html>
