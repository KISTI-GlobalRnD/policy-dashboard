<html lang="ko">

    <title>정책-기술 대시보드로 이동 중</title>

      (function () {
        const next = new URL("./frontend/dist/index.html?view=matrix", window.location.href);
        next.search = "view=matrix";
        if (next.href !== window.location.href) {
          window.location.replace(next.href);
        }
      })();
    </script>

      기술x정책 매트릭스로 이동합니다.
